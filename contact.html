<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | For Health Acupuncture and Natural Therapies</title>
  <meta name="description" content="Find us, our opening hours and get directions. Book your massage or acupuncture appointment today.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Mulish:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="images/logo-mark.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header id="site-header"></header>

  <section class="page-hero">
    <div class="container">
      <span class="eyebrow">Come Say Hello</span>
      <h1>Contact Us</h1>
      <p>We'd love to welcome you. Find our details, opening hours and directions below.</p>
    </div>
  </section>

  <section class="section--tight" style="padding-top:46px;">
    <div class="container">
      <figure class="storefront">
        <img src="images/storefront.jpg" alt="For Health Acupuncture and Natural Therapies storefront at Grand Plaza Shopping Centre" loading="lazy">
        <figcaption>Visit us in-store at Grand Plaza Shopping Centre, Browns Plains</figcaption>
      </figure>
    </div>
  </section>

  <section class="section" style="padding-top:30px;">
    <div class="container contact-grid">
      <div class="info-card">
        <div class="info-block">
          <div class="info-block__icon">📍</div>
          <div>
            <h4>Address</h4>
            <p id="field-address"></p>
            <p style="margin-top:8px;"><a class="btn btn--dark" style="padding:9px 20px; font-size:.85rem;" data-map-link target="_blank" rel="noopener">Get Directions</a></p>
          </div>
        </div>
        <div class="info-block">
          <div class="info-block__icon">📞</div>
          <div>
            <h4>Phone</h4>
            <p id="field-phone"></p>
          </div>
        </div>
        <div class="info-block">
          <div class="info-block__icon">✉️</div>
          <div>
            <h4>Email</h4>
            <p id="field-email"></p>
          </div>
        </div>
        <div class="info-block">
          <div class="info-block__icon">🕒</div>
          <div style="flex:1;">
            <h4>Opening Hours</h4>
            <ul class="hours-list" id="field-hours"></ul>
          </div>
        </div>
      </div>

      <div class="map-wrap" id="field-map"></div>
    </div>
  </section>

  <footer id="site-footer"></footer>

  <script src="data/site.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
